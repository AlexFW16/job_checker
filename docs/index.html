<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Checker Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
        }
        .container { max-width: 960px; margin: 0 auto; padding: 2rem 1rem; }
        header { margin-bottom: 2rem; }
        h1 { font-size: 1.75rem; color: #f8fafc; margin-bottom: 0.25rem; }
        .subtitle { color: #94a3b8; font-size: 0.875rem; }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .stat-card {
            background: #1e293b;
            border-radius: 0.75rem;
            padding: 1rem 1.25rem;
            border: 1px solid #334155;
        }
        .stat-card .label { color: #94a3b8; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; }
        .stat-card .value { font-size: 1.5rem; font-weight: 700; color: #38bdf8; margin-top: 0.25rem; }
        .filters {
            display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1.5rem;
        }
        .filter-btn {
            background: #1e293b;
            border: 1px solid #334155;
            color: #cbd5e1;
            padding: 0.4rem 0.85rem;
            border-radius: 2rem;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.15s;
        }
        .filter-btn:hover { border-color: #38bdf8; color: #38bdf8; }
        .filter-btn.active { background: #0c4a6e; border-color: #38bdf8; color: #38bdf8; }
        .job-list { display: flex; flex-direction: column; gap: 0.75rem; }
        .job-card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 0.75rem;
            padding: 1.25rem;
            transition: border-color 0.15s;
        }
        .job-card:hover { border-color: #475569; }
        .job-card a { text-decoration: none; color: inherit; }
        .job-title { font-size: 1.05rem; font-weight: 600; color: #f1f5f9; margin-bottom: 0.5rem; }
        .job-title a:hover { color: #38bdf8; }
        .job-meta { display: flex; flex-wrap: wrap; gap: 0.75rem; font-size: 0.8rem; color: #94a3b8; margin-bottom: 0.75rem; }
        .job-meta span { display: flex; align-items: center; gap: 0.3rem; }
        .tags { display: flex; flex-wrap: wrap; gap: 0.4rem; }
        .tag {
            font-size: 0.7rem;
            padding: 0.2rem 0.6rem;
            border-radius: 1rem;
            font-weight: 500;
        }
        .tag.junior { background: #064e3b; color: #6ee7b7; }
        .tag.software { background: #1e3a5f; color: #93c5fd; }
        .tag.math { background: #4c1d95; color: #c4b5fd; }
        .tag.source { background: #422006; color: #fbbf24; }
        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: #64748b;
        }
        .empty-state svg { width: 48px; height: 48px; margin-bottom: 1rem; opacity: 0.4; }
        .loading { text-align: center; padding: 3rem; color: #64748b; }
        .error { text-align: center; padding: 3rem; color: #f87171; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Job Checker Dashboard</h1>
            <p class="subtitle" id="last-check">Loading...</p>
        </header>

        <div class="stats" id="stats">
            <div class="stat-card">
                <div class="label">Total Jobs</div>
                <div class="value" id="stat-total">-</div>
            </div>
            <div class="stat-card">
                <div class="label">Matching</div>
                <div class="value" id="stat-matching">-</div>
            </div>
            <div class="stat-card">
                <div class="label">Sources</div>
                <div class="value" id="stat-sources">-</div>
            </div>
        </div>

        <div class="filters" id="filters">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="junior">Junior</button>
            <button class="filter-btn" data-filter="software">Software/IT</button>
            <button class="filter-btn" data-filter="math">Math/Data</button>
        </div>

        <div class="job-list" id="job-list">
            <div class="loading">Loading results...</div>
        </div>
    </div>

    <script>
        let allJobs = [];
        let currentFilter = 'all';

        async function loadData() {
            try {
                const res = await fetch('results.json?' + Date.now());
                if (!res.ok) throw new Error('Failed to load results.json');
                const data = await res.json();
                allJobs = data.results || [];
                render(data);
            } catch (err) {
                document.getElementById('job-list').innerHTML =
                    `<div class="error">Could not load results. Make sure the GitHub Action has run at least once.<br><small>${err.message}</small></div>`;
            }
        }

        function render(data) {
            const date = new Date(data.check_date);
            document.getElementById('last-check').textContent =
                `Last checked: ${date.toLocaleString()}`;
            document.getElementById('stat-total').textContent = data.total_jobs_found;
            document.getElementById('stat-matching').textContent = data.matching_jobs;

            const sources = new Set(allJobs.map(j => j.source));
            document.getElementById('stat-sources').textContent = sources.size;

            applyFilter();
        }

        function applyFilter() {
            let filtered = allJobs;
            if (currentFilter !== 'all') {
                const key = currentFilter === 'junior' ? 'is_junior_level'
                    : currentFilter === 'software' ? 'is_software_dev'
                    : 'is_math_related';
                filtered = allJobs.filter(j => j.match_details[key]);
            }

            const list = document.getElementById('job-list');
            if (filtered.length === 0) {
                list.innerHTML = `<div class="empty-state">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                    <p>No matching jobs found for this filter.</p>
                </div>`;
                return;
            }

            list.innerHTML = filtered.map(job => {
                const tags = [];
                if (job.match_details.is_junior_level) tags.push('<span class="tag junior">Junior</span>');
                if (job.match_details.is_software_dev) tags.push('<span class="tag software">Software/IT</span>');
                if (job.match_details.is_math_related) tags.push('<span class="tag math">Math/Data</span>');
                tags.push(`<span class="tag source">${job.source}</span>`);

                const url = job.url.startsWith('http') ? job.url : `https://www.tgw-group.com${job.url}`;

                return `<div class="job-card">
                    <div class="job-title"><a href="${url}" target="_blank" rel="noopener">${job.title}</a></div>
                    <div class="job-meta">
                        <span>${job.location}, ${job.country}</span>
                        <span>${job.category}</span>
                        <span>${job.experience_level}</span>
                    </div>
                    <div class="tags">${tags.join('')}</div>
                </div>`;
            }).join('');
        }

        document.getElementById('filters').addEventListener('click', e => {
            if (!e.target.classList.contains('filter-btn')) return;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            e.target.classList.add('active');
            currentFilter = e.target.dataset.filter;
            applyFilter();
        });

        loadData();
    </script>
</body>
</html>
